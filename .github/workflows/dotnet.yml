name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Publish
      run: |
        dotnet publish OpenSlalom.UI/OpenSlalom.UI.csproj `
          -c Release `
          -o publish

    - name: Create ZIP package
      shell: pwsh
      run: |
        # Zielordner für Artifacts anlegen
        New-Item -ItemType Directory -Force -Path artifact | Out-Null

        # Publish-Ordner komprimieren
        Compress-Archive `
          -Path "publish\*" `
          -DestinationPath "artifact\OpenSlalom.UI.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenSlalom.UI
        path: artifact/OpenSlalom.UI.zip
        if-no-files-found: error
